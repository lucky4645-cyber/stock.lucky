<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky's Trading Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0e17] text-white">

    <div class="p-4 bg-[#131722] border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-xl font-bold text-sky-400">PRO TERMINAL</h1>
        <div class="flex gap-4 text-xs font-mono">
            <span class="text-emerald-400">NSE ACTIVE</span>
            <span class="text-gray-500">BSE ACTIVE</span>
        </div>
    </div>

    <div class="h-[550px] w-full border-b border-gray-800">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_main" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "NSE:SBIN",
                    "interval": "D",
                    "timezone": "Asia/Kolkata",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "withdateranges": true,
                    "details": true,
                    "hotlist": true,
                    "calendar": true,
                    "show_popup_button": true,
                    "container_id": "tradingview_main"
                });
            </script>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">
        <div class="bg-[#131722] rounded-xl p-4 border border-gray-800">
            <h2 class="text-sky-400 font-bold mb-4">Financial Analysis</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-financials.js" async>
                {
                    "isTransparent": true,
                    "displayMode": "regular",
                    "width": "100%",
                    "height": "400",
                    "colorTheme": "dark",
                    "symbol": "NSE:SBIN",
                    "locale": "en"
                }
                </script>
            </div>
        </div>

        <div class="bg-[#131722] rounded-xl p-4 border border-gray-800">
            <h2 class="text-sky-400 font-bold mb-4">Technical Outlook</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "400",
                    "symbol": "NSE:SBIN",
                    "showIntervalTabs": true,
                    "displayMode": "single",
                    "locale": "en",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>
    </div>

</body>
</html>
