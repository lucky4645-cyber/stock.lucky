
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky's Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0e17] text-white">

    <div class="p-4 bg-[#131722] border-b border-gray-800 flex justify-between items-center">
        <h1 class="text-xl font-bold text-sky-400">STOCK TERMINAL</h1>
        <span class="text-xs text-emerald-400 font-mono animate-pulse text-right">● LIVE FEED</span>
    </div>

    <div class="h-[600px] w-full">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
          {
          "autosize": true,
          "symbol": "NSE:SBIN",
          "interval": "D",
          "timezone": "Asia/Kolkata",
          "theme": "dark",
          "style": "1",
          "locale": "en",
          "allow_symbol_change": true,
          "calendar": true,
          "support_host": "https://www.tradingview.com"
        }
          </script>
        </div>
        </div>

    <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-[#131722] p-4 rounded-xl border border-gray-800 min-h-[400px]">
            <h3 class="text-sky-400 font-bold mb-4">Financials</h3>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-financials.js" async>
                {
                  "isTransparent": true,
                  "displayMode": "regular",
                  "width": "100%",
                  "height": "400",
                  "colorTheme": "dark",
                  "symbol": "NSE:SBIN",
                  "locale": "en"
                }
                </script>
            </div>
        </div>
        
        <div class="bg-[#131722] p-4 rounded-xl border border-gray-800 min-h-[400px]">
            <h3 class="text-sky-400 font-bold mb-4">Technical Gauge</h3>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                  "interval": "1D",
                  "width": "100%",
                  "isTransparent": true,
                  "height": "400",
                  "symbol": "NSE:SBIN",
                  "showIntervalTabs": true,
                  "displayMode": "single",
                  "locale": "en",
                  "colorTheme": "dark"
                }
                </script>
            </div>
        </div>
    </div>

</body>
</html>
